<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SentraMap — AI Attack Surface Intelligence</title>
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
</head>
<body>
<canvas id="particles"></canvas>
<div class="circuit-bg"></div>
<div class="scanbeam"></div>

<div id="bootSequence" class="boot-sequence">
  <div class="boot-grid"></div>
  <div class="boot-ring boot-ring-1"></div>
  <div class="boot-ring boot-ring-2"></div>
  <div class="boot-ring boot-ring-3"></div>
  <div class="boot-content">
    <div class="boot-logo">SENTRAMAP</div>
    <div class="boot-line" id="bootLine">INITIALIZING...</div>
    <div class="boot-progress"><div class="boot-progress-fill" id="bootProgressFill"></div></div>
  </div>
  <div class="hud-corner tl"></div>
  <div class="hud-corner tr"></div>
  <div class="hud-corner bl"></div>
  <div class="hud-corner br"></div>
</div>

<div class="hud-corner tl fixed"></div>
<div class="hud-corner tr fixed"></div>
<div class="hud-corner bl fixed"></div>
<div class="hud-corner br fixed"></div>

<div class="app" id="mainApp">
  <div class="topbar">
    <div class="brand"><span class="dot"></span> SentraMap</div>
    <div class="topbar-actions">
      <span class="usage-pill" id="usagePill"></span>
      <select id="domainSelect"></select>
      <button class="btn btn-ghost btn-sm" id="myDomainsBtn">+ My Domains</button>
      <button class="btn btn-accent" id="scanBtn">▶ Scan</button>
      <button class="btn btn-accent btn-sm" id="upgradeBtn" style="display:none;">⚡ Upgrade to Pro</button>
      <div id="authArea"></div>
    </div>
  </div>

  <div class="layout">
    <div class="graph-panel">
      <div class="mesh-glow mesh-1"></div>
      <div class="mesh-glow mesh-2"></div>
      <svg id="graph"></svg>
      <div id="scanStatus" class="scan-status"></div>
      <div id="terminalFeed" class="terminal-feed"></div>
      <div class="gauge-wrap" id="gaugeWrap" style="display:none;">
        <svg class="gauge-svg" viewBox="0 0 150 150">
          <circle class="gauge-ring-bg" cx="75" cy="75" r="62"/>
          <g id="gaugeTicks"></g>
          <circle class="gauge-ring-fill" id="gaugeFill" cx="75" cy="75" r="62" stroke="#39d6ff"
            stroke-dasharray="389.6" stroke-dashoffset="389.6" transform="rotate(-90 75 75)"/>
          <line class="gauge-sweep" id="gaugeSweep" x1="75" y1="75" x2="75" y2="16" stroke="#39d6ff" stroke-width="1.5" opacity="0.6"/>
          <text class="gauge-score" id="gaugeScore" x="75" y="72" fill="#39d6ff">--</text>
          <text class="gauge-label" id="gaugeLabel" x="75" y="92">SECURITY SCORE</text>
        </svg>
      </div>
    </div>
    <div class="detail-panel" id="detailPanel">
      <div class="detail-empty">Click any node on the graph to inspect it.</div>
    </div>
  </div>
</div>

<!-- AUTH MODAL -->
<div class="modal-overlay" id="authModal">
  <div class="modal">
    <div style="font-size:30px;">🔐</div>
    <h3 id="authTitle">Log in</h3>
    <p>Save domains, track Pro status.</p>
    <button class="btn btn-ghost" id="googleBtn" style="width:100%; justify-content:center; margin-bottom:14px; gap:10px;">Continue with Google</button>
    <div style="text-align:center; color:var(--text-dim); font-size:11px; margin-bottom:14px;">— or —</div>
    <div class="field"><input id="authEmail" type="email" placeholder="you@company.com"></div>
    <div class="field"><input id="authPassword" type="password" placeholder="Password"></div>
    <button class="btn btn-accent" id="authSubmit" style="width:100%; justify-content:center; margin-bottom:10px;">Log in</button>
    <div style="font-size:12.5px; color:var(--text-dim);">
      <span id="authToggleText">No account?</span> <a href="#" id="authToggleLink" style="color:var(--accent);">Sign up</a>
    </div>
    <button class="btn btn-ghost btn-sm" id="closeAuthModal" style="width:100%; justify-content:center; margin-top:14px;">Cancel</button>
  </div>
</div>

<!-- MY DOMAINS MODAL -->
<div class="modal-overlay" id="domainsModal">
  <div class="modal" style="max-width:460px; text-align:left;">
    <h3 style="text-align:center;">Your Domains</h3>
    <div class="field"><input id="newDomainInput" placeholder="yourcompany.com"></div>
    <label style="display:flex; gap:8px; font-size:12.5px; color:var(--text-dim); align-items:flex-start; margin-bottom:14px;">
      <input type="checkbox" id="consentCheck" style="margin-top:3px;">
      I own this domain, or have explicit written permission to scan it.
    </label>
    <button class="btn btn-accent" id="addDomainBtn" style="width:100%; justify-content:center; margin-bottom:16px;">Add Domain</button>
    <div id="myDomainsList" style="max-height:220px; overflow-y:auto; margin-bottom:14px;"></div>
    <button class="btn btn-ghost" id="closeDomainsModal" style="width:100%; justify-content:center;">Close</button>
  </div>
</div>

<!-- PAYWALL MODAL -->
<div class="modal-overlay" id="paywallModal">
  <div class="modal">
    <div style="font-size:34px;">🔒</div>
    <h3>Daily limit reached</h3>
    <p>Upgrade to Pro for unlimited scans and unlimited custom domains.</p>
    <div class="price-tag">$19<span>/month</span></div>
    <button class="btn btn-accent" id="checkoutBtn" style="width:100%; justify-content:center; margin-bottom:10px;">Upgrade Now</button>
    <button class="btn btn-ghost" id="closePaywall" style="width:100%; justify-content:center;">Maybe later</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/boot.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/particles.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
